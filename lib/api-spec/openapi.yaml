openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AI-Powered School Operating System API — Phase 0
servers:
  - url: /api
    description: Base API path
security:
  - bearerAuth: []
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Credential authentication and session management
  - name: organizations
    description: Societies, schools, branches, and academic sessions
  - name: students
    description: Student enrollment and records
  - name: users
    description: Branch users and staff
  - name: classes
    description: Classes and sections
  - name: attendance
    description: Attendance tracking
  - name: fees
    description: Fee management and billing
  - name: announcements
    description: Announcements and notices
  - name: dashboard
    description: Dashboard analytics and audit events
  - name: analytics
    description: Session analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"

  /auth/captcha:
    get:
      operationId: getAuthCaptcha
      tags: [auth]
      summary: Get a math captcha challenge for login
      security: []
      responses:
        "200":
          description: Captcha challenge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaptchaResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with user code, access code, and captcha
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials or captcha
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/password/forgot:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password recovery (not yet implemented)
      security: []
      responses:
        "501":
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /schools:
    get:
      operationId: listSchools
      tags: [organizations]
      summary: List schools
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
      responses:
        "200":
          description: Paginated school list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolList"
    post:
      operationId: createSchool
      tags: [organizations]
      summary: Create a school
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSchoolBody"
      responses:
        "201":
          description: School created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

  /schools/{schoolId}:
    get:
      operationId: getSchool
      tags: [organizations]
      summary: Get school by ID
      parameters:
        - $ref: "#/components/parameters/SchoolIdParam"
      responses:
        "200":
          description: School details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"
        "404":
          description: School not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSchool
      tags: [organizations]
      summary: Update a school
      parameters:
        - $ref: "#/components/parameters/SchoolIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSchoolBody"
      responses:
        "200":
          description: School updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/School"

  /societies:
    get:
      operationId: listSocieties
      tags: [organizations]
      summary: List societies
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
      responses:
        "200":
          description: Paginated society list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocietyList"

  /societies/{societyId}:
    get:
      operationId: getSociety
      tags: [organizations]
      summary: Get society by ID
      parameters:
        - $ref: "#/components/parameters/SocietyIdParam"
      responses:
        "200":
          description: Society details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Society"
        "404":
          description: Society not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /societies/{societyId}/schools:
    get:
      operationId: listSocietySchools
      tags: [organizations]
      summary: List schools in a society
      parameters:
        - $ref: "#/components/parameters/SocietyIdParam"
      responses:
        "200":
          description: Schools in society
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolList"

  /schools/{schoolId}/branches:
    get:
      operationId: listSchoolBranches
      tags: [organizations]
      summary: List branches for a school
      parameters:
        - $ref: "#/components/parameters/SchoolIdParam"
      responses:
        "200":
          description: Branches in school
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchList"

  /branches/{branchId}:
    get:
      operationId: getBranch
      tags: [organizations]
      summary: Get branch by ID
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      responses:
        "200":
          description: Branch details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Branch"
        "404":
          description: Branch not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /branches/{branchId}/sessions:
    get:
      operationId: listBranchSessions
      tags: [organizations]
      summary: List academic sessions for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      responses:
        "200":
          description: Academic sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSessionList"
    post:
      operationId: createAcademicSession
      tags: [organizations]
      summary: Create an academic session for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSession"

  /branches/{branchId}/sessions/current:
    get:
      operationId: getCurrentSession
      tags: [organizations]
      summary: Get current academic session for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSession"
        "404":
          description: No current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /branches/{branchId}/sessions/{sessionId}:
    patch:
      operationId: updateAcademicSession
      tags: [organizations]
      summary: Update an academic session
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSession"

  /branches/{branchId}/sessions/{sessionId}/set-current:
    post:
      operationId: setCurrentAcademicSession
      tags: [organizations]
      summary: Set the current academic session for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSession"

  /branches/{branchId}/financial-sessions:
    get:
      operationId: listFinancialSessions
      tags: [organizations]
      summary: List financial year sessions for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      responses:
        "200":
          description: Financial sessions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSessionList"
    post:
      operationId: createFinancialSession
      tags: [organizations]
      summary: Create a financial year session for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created financial session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSession"

  /branches/{branchId}/financial-sessions/current:
    get:
      operationId: getCurrentFinancialSession
      tags: [organizations]
      summary: Get current financial year session for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      responses:
        "200":
          description: Current financial session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSession"
        "404":
          description: No current financial session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /branches/{branchId}/financial-sessions/{financialSessionId}:
    patch:
      operationId: updateFinancialSession
      tags: [organizations]
      summary: Update a financial year session
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - name: financialSessionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
      responses:
        "200":
          description: Updated financial session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSession"

  /branches/{branchId}/financial-sessions/{financialSessionId}/set-current:
    post:
      operationId: setCurrentFinancialSession
      tags: [organizations]
      summary: Set the current financial year session for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - name: financialSessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current financial session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSession"

  /branches/{branchId}/sessions/{sessionId}/students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List students in a branch session
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/StudentStatus"
      responses:
        "200":
          description: Paginated student list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentList"
    post:
      operationId: createStudent
      tags: [students]
      summary: Enroll a new student
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /branches/{branchId}/sessions/{sessionId}/students/{studentId}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get student details
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/StudentIdParam"
      responses:
        "200":
          description: Student details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student information
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/StudentIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Remove a student
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/StudentIdParam"
      responses:
        "200":
          description: Student removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /branches/{branchId}/users:
    get:
      operationId: listBranchUsers
      tags: [users]
      summary: List users in a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/UserRole"
        - $ref: "#/components/parameters/SearchParam"
      responses:
        "200":
          description: Branch users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffList"
    post:
      operationId: createBranchUser
      tags: [users]
      summary: Create a branch user
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBranchUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /branches/{branchId}/users/{userId}:
    get:
      operationId: getBranchUser
      tags: [users]
      summary: Get branch user details
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateBranchUser
      tags: [users]
      summary: Update branch user
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/UserIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBranchUserBody"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /branches/{branchId}/sessions/{sessionId}/classes:
    get:
      operationId: listClasses
      tags: [classes]
      summary: List classes in a branch session
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Class"
    post:
      operationId: createClass
      tags: [classes]
      summary: Create a class
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassBody"
      responses:
        "201":
          description: Class created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Class"

  /branches/{branchId}/sessions/{sessionId}/classes/{classId}/sections:
    get:
      operationId: listSections
      tags: [classes]
      summary: List sections for a class
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/ClassIdParam"
      responses:
        "200":
          description: List of sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"
    post:
      operationId: createSection
      tags: [classes]
      summary: Create a section
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/ClassIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSectionBody"
      responses:
        "201":
          description: Section created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Section"

  /branches/{branchId}/sessions/{sessionId}/attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: Get attendance records
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
        - name: sectionId
          in: query
          schema:
            type: ["integer", "null"]
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark attendance for students
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceBody"
      responses:
        "200":
          description: Attendance marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /branches/{branchId}/sessions/{sessionId}/attendance/summary:
    get:
      operationId: getAttendanceSummary
      tags: [attendance]
      summary: Get attendance summary stats
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - name: classId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSummary"

  /branches/{branchId}/sessions/{sessionId}/fees:
    get:
      operationId: listFeeRecords
      tags: [fees]
      summary: List fee records
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: studentId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/FeeStatus"
      responses:
        "200":
          description: Fee records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeList"
    post:
      operationId: createFeeRecord
      tags: [fees]
      summary: Create a fee record
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeRecordBody"
      responses:
        "201":
          description: Fee record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeRecord"

  /branches/{branchId}/sessions/{sessionId}/fees/{feeId}/pay:
    post:
      operationId: recordFeePayment
      tags: [fees]
      summary: Record a fee payment
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
        - $ref: "#/components/parameters/FeeIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordFeePaymentBody"
      responses:
        "200":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeRecord"

  /branches/{branchId}/sessions/{sessionId}/fees/summary:
    get:
      operationId: getFeeSummary
      tags: [fees]
      summary: Get fee collection summary
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Fee summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeSummary"

  /branches/{branchId}/announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List announcements
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - name: audience
          in: query
          schema:
            $ref: "#/components/schemas/AnnouncementAudience"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an announcement
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementBody"
      responses:
        "201":
          description: Announcement created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /branches/{branchId}/announcements/{announcementId}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/AnnouncementIdParam"
      responses:
        "200":
          description: Announcement deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /platform/dashboard:
    get:
      operationId: getPlatformDashboard
      tags: [dashboard]
      summary: Get platform-wide dashboard stats (super admin only)
      responses:
        "200":
          description: Platform dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminDashboard"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForbiddenResponse"

  /branches/{branchId}/dashboard:
    get:
      operationId: getBranchDashboard
      tags: [dashboard]
      summary: Get branch dashboard stats
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - name: sessionId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolDashboard"

  /societies/{societyId}/dashboard:
    get:
      operationId: getSocietyDashboard
      tags: [dashboard]
      summary: Get society dashboard stats
      parameters:
        - $ref: "#/components/parameters/SocietyIdParam"
      responses:
        "200":
          description: Society dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuperAdminDashboard"

  /branches/{branchId}/audit-events:
    get:
      operationId: listAuditEvents
      tags: [dashboard]
      summary: List audit events for a branch
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /branches/{branchId}/sessions/{sessionId}/analytics/classes:
    get:
      operationId: getClassAnalytics
      tags: [analytics]
      summary: Get per-class analytics for a session
      parameters:
        - $ref: "#/components/parameters/BranchIdParam"
        - $ref: "#/components/parameters/SessionIdParam"
      responses:
        "200":
          description: Class analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassAnalytics"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token-{userId}
      description: Bearer token issued by POST /auth/login

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
    SearchParam:
      name: search
      in: query
      schema:
        type: string
    SocietyIdParam:
      name: societyId
      in: path
      required: true
      schema:
        type: integer
    SchoolIdParam:
      name: schoolId
      in: path
      required: true
      schema:
        type: integer
    BranchIdParam:
      name: branchId
      in: path
      required: true
      schema:
        type: integer
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
    StudentIdParam:
      name: studentId
      in: path
      required: true
      schema:
        type: integer
    UserIdParam:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    ClassIdParam:
      name: classId
      in: path
      required: true
      schema:
        type: integer
    FeeIdParam:
      name: feeId
      in: path
      required: true
      schema:
        type: integer
    AnnouncementIdParam:
      name: announcementId
      in: path
      required: true
      schema:
        type: integer

  schemas:
