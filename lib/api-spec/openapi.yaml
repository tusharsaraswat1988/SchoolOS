      required: [question, token]
      properties:
        question:
          type: string
        token:
          type: string

    LoginBody:
      type: object
      required: [userId, accessCode, captchaAnswer, captchaToken]
      properties:
        schoolCode:
          type: string
          nullable: true
        userId:
          type: string
        accessCode:
          type: string
        captchaAnswer:
          type: string
        captchaToken:
          type: string

    LoginResponse:
      type: object
      required: [user, token, permissions, redirectPath]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        token:
          type: string
        permissions:
          type: array
          items:
            type: string
        redirectPath:
          type: string
        activeContext:
