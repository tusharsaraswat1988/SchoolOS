kind = "web"
previewPath = "/"
title = "School OS"
version = "1.0.0"
id = "artifacts/school-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19297

[services.development]
run = "pnpm --filter @workspace/school-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-os", "run", "build" ]
publicDir = "artifacts/school-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19297"
BASE_PATH = "/"
